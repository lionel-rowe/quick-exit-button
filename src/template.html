<style>{{ @include styles.css }}</style>

<!-- Exit Button -->
<button part="button" class="exit-button">
	<div class="button-content">
		<span class="main-text" data-i18n="button-label"></span>
		{{ @include close.svg }}
	</div>
	<div>
		<small data-i18n="shortcut-description" class="shortcut-description"></small>
	</div>
</button>

<!-- Info Toggle-->
<button class="info-toggle" data-i18n="safety-information" aria-describedby="safety-info">
	{{ @include info.svg }}
</button>

<!-- Safety Info Box -->
<div class="safety-info" hidden>
	<span data-i18n="safety-text"></span>
	<a target="_blank" rel="noopener noreferrer" data-i18n="safety-link"></a>
</div>
